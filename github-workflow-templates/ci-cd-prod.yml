name: Deploy - PROD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/deploy-reusable.yml
    with:
      environment-name: 'Production'
      app-name: 'TU_APP_PROD'
      build-definition: 'BackOfficePROD'
      settings-var: ${{ vars.PROD_JSON }}
      verify-url: 'https://TU_APP_PROD.azurewebsites.net'
    secrets:
      publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_PROD }}
